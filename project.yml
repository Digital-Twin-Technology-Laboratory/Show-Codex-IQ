name: ShowCodexIQ
options:
  bundleIdPrefix: io.github.zzzzzzjw
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: NO
    CLANG_ENABLE_MODULES: YES
    SWIFT_STRICT_CONCURRENCY: complete
    VERSIONING_SYSTEM: apple-generic
configs:
  Debug: debug
  Release: release
targets:
  ShowCodexIQCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/ShowCodexIQCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.zzzzzzjw.ShowCodexIQCore
        PRODUCT_NAME: ShowCodexIQCore
        DEFINES_MODULE: YES
  ShowCodexIQ:
    type: application
    platform: macOS
    sources:
      - path: Sources/ShowCodexIQ
        excludes:
          - Config/Info.plist
    resources:
      - path: Sources/ShowCodexIQ/Resources
    info:
      path: Sources/ShowCodexIQ/Config/Info.plist
    dependencies:
      - target: ShowCodexIQCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.zzzzzzjw.ShowCodexIQ
        PRODUCT_NAME: Show Codex IQ
        MARKETING_VERSION: 0.1.0-beta.1
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ShowCodexIQTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ShowCodexIQTests
    resources:
      - path: Tests/ShowCodexIQTests/Fixtures
    dependencies:
      - target: ShowCodexIQCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.zzzzzzjw.ShowCodexIQTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  ShowCodexIQ:
    build:
      targets:
        ShowCodexIQ: all
        ShowCodexIQTests: [test]
    test:
      targets:
        - ShowCodexIQTests
